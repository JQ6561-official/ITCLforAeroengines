        function loadData() {
            // 加载选项卡内容
            const storedTabs = localStorage.getItem(`${CASE_ID}_tabs`);
            if (storedTabs) {
                try { tabContents = JSON.parse(storedTabs); } catch(e){ tabContents = [...DEFAULT_TAB_CONTENTS]; }
            } else {
                tabContents = [...DEFAULT_TAB_CONTENTS];
            }

            // 加载点赞数
            const storedLikes = localStorage.getItem(`${CASE_ID}_likes`);
            likeCount = storedLikes ? parseInt(storedLikes, 10) : 42;

            // 加载评论
            const storedComments = localStorage.getItem(`${CASE_ID}_comments`);
            if (storedComments) {
                try { comments = JSON.parse(storedComments); } catch(e){ comments = []; }
            } else {
                // 默认评论
                comments = [
                    { id: 'c1', author: '热力工程师', text: '非常详细的案例，MBSE部分很有启发。', time: Date.now() - 86400000 },
                    { id: 'c2', author: '气动专家', text: '期待后续更多数字孪生数据。', time: Date.now() - 3600000 }
                ];
            }

            likeSpan.textContent = likeCount;
        }

        function saveTabs() {
            localStorage.setItem(`${CASE_ID}_tabs`, JSON.stringify(tabContents));
        }
        function saveLikes() {
            localStorage.setItem(`${CASE_ID}_likes`, likeCount);
        }
        function saveComments() {
            localStorage.setItem(`${CASE_ID}_comments`, JSON.stringify(comments));
        }

        // 渲染当前选项卡内容到展示区，并调用MathJax
        function renderCurrentTab() {
            if (tabContents[currentTab]) {
                contentDisplay.innerHTML = tabContents[currentTab].replace(/\n/g, '<br>');
            } else {
                contentDisplay.innerHTML = '暂无内容';
            }
            // 触发 MathJax 渲染 (若存在)
            if (window.MathJax) {
                MathJax.typesetPromise([contentDisplay]).catch(err => console.warn('MathJax渲染错误', err));
            }
        }

        // 渲染所有评论
        function renderComments() {
            if (comments.length === 0) {
                commentsList.innerHTML = '<div style="text-align:center; padding:2rem; color:#839eb3;">暂无评论，来说两句吧</div>';
                return;
            }
            // 按时间倒序
            const sorted = [...comments].sort((a,b) => b.time - a.time);
            let html = '';
            sorted.forEach(c => {
                const date = new Date(c.time).toLocaleString('zh-CN', {hour12: false});
                html += `
                    <li class="comment-item" data-comment-id="${c.id}">
                        <div class="comment-avatar">${c.author.charAt(0)}</div>
                        <div class="comment-content">
                            <span class="comment-author">${escapeHtml(c.author)}</span>
                            <span class="comment-time">${date}</span>
                            <div class="comment-text">${escapeHtml(c.text)}</div>
                        </div>
                        <button class="comment-delete" title="删除评论(需密码)"><i class="fas fa-trash-alt"></i></button>
                    </li>
                `;
            });
            commentsList.innerHTML = html;
            // 给删除按钮添加事件
            document.querySelectorAll('.comment-delete').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const li = e.currentTarget.closest('.comment-item');
                    if (!li) return;
                    const commentId = li.dataset.commentId;
                    deleteCommentById(commentId);
                });
            });
        }

        // 简单转义
        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<>"]/g, function(m) {
                if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; if(m === '"') return '&quot;';
                return m;
            });
        }

        // 删除评论 (验证密码)
        function deleteCommentById(commentId) {
            const pwd = prompt('请输入管理员密码以删除评论：');
            if (pwd !== ADMIN_PASSWORD) {
                alert('密码错误，无法删除');
                return;
            }
            comments = comments.filter(c => c.id !== commentId);
            saveComments();
            renderComments();
        }

        // 初始化选项卡高亮
        function setActiveTab(index) {
            tabElements.forEach((tab, i) => {
                if (i === index) tab.classList.add('active');
                else tab.classList.remove('active');
            });
            currentTab = index;
            renderCurrentTab();
        }

        // 显示编辑界面
        function showEditor() {
            const currentText = tabContents[currentTab] || '';
            editContainer.style.display = 'block';
            editContainer.innerHTML = `
                <div class="edit-area">
                    <textarea class="edit-textarea" id="editorTextarea">${escapeHtml(currentText)}</textarea>
                    <div class="edit-actions">
                        <button class="save-btn" id="saveEditBtn"><i class="fas fa-save"></i> 保存</button>
                        <button class="cancel-btn" id="cancelEditBtn"><i class="fas fa-times"></i> 取消</button>
                    </div>
                </div>
            `;
            contentDisplay.style.display = 'none';
            editBtn.style.display = 'none';

            document.getElementById('saveEditBtn').addEventListener('click', () => {
                const pwd = prompt('请输入管理员密码以保存编辑：');
                if (pwd !== ADMIN_PASSWORD) {
                    alert('密码错误，无法保存');
                    return;
                }
                const newText = document.getElementById('editorTextarea').value;
                tabContents[currentTab] = newText;
                saveTabs();
                exitEdit();
                renderCurrentTab();
            });

            document.getElementById('cancelEditBtn').addEventListener('click', exitEdit);
        }

        function exitEdit() {
            editContainer.style.display = 'none';
            editContainer.innerHTML = '';
            contentDisplay.style.display = 'block';
            editBtn.style.display = 'flex';
        }

        // 事件绑定
        tabElements.forEach(tab => {
            tab.addEventListener('click', (e) => {
                const idx = parseInt(tab.dataset.tab, 10);
                setActiveTab(idx);
            });
        });

        // 返回处理
        returnTab.addEventListener('click', () => {
            if (confirm('返回案例列表页？')) {
                window.location.href = 'wx.html';  // 假设从维修保障页面进入，但统一返回列表
            }
        });

        // 编辑按钮
        editBtn.addEventListener('click', () => {
            const pwd = prompt('请输入管理员密码进入编辑模式：');
            if (pwd !== ADMIN_PASSWORD) {
                alert('密码错误');
                return;
            }
            showEditor();
        });

        // 点赞
        likeBtn.addEventListener('click', () => {
            likeCount += 1;
            likeSpan.textContent = likeCount;
            saveLikes();
        });

        // 发布评论
        postCommentBtn.addEventListener('click', () => {
            const author = commentAuthor.value.trim() || '匿名';
            const text = commentContent.value.trim();
            if (!text) {
                alert('评论内容不能为空');
                return;
            }
            const newComment = {
                id: 'c_' + Date.now() + Math.random().toString(36).substr(2, 6),
                author: author,
                text: text,
                time: Date.now()
            };
            comments.push(newComment);
            saveComments();
            renderComments();
            commentContent.value = ''; // 清空输入
        });

        // 初始化数据与渲染
        loadData();
        renderCurrentTab();
        renderComments();

        // 确保MathJax渲染动态内容 (也用于编辑保存后)
        window.addEventListener('load', () => {
            if (window.MathJax) {
                MathJax.typesetPromise([contentDisplay]).catch(e => console.warn(e));
            }
        });

        // 如果管理员编辑保存后，renderCurrentTab会再次触发MathJax渲染

        // 处理点击外部cancel等情况 (已经包含)
    })();
</script>
<!-- 说明：本页面为案例详情页，包含五个选项卡及编辑、点赞评论功能。
     管理员密码统一为 admin (演示用)。编辑支持 LaTeX，通过MathJax渲染。 -->
</body>
